<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dino To Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="newStyle.css">
    <link rel="stylesheet" href="mobileStyle.css">
  </head>
  <body>

    <section class="container">
        <div class="row">
            <div class="col-sm-12 sec-col">

                <!--  -->
                <div class="dino-group">
                    <div class="sec-nav">
                    <h3>To Do List</h3>
                    <h5 id="datetime" class="date"></h5>
                </div>

                <!--  -->
                <div class="dino-group">
                    <div class="progress-box">
                        <div class="ground"></div>
                        <div class="dino">
                            <img width="25" src="image/dino.png" alt="">
                            </div>
                        <div class="cactus">
                            <img width="20" src="image/cactus.png" alt="">
                        </div>
                    </div>
                </div>
                </div>
                <div>
                    <input class="sec-input" type="text" id="todolist" placeholder="Task...">
                    <button  id="addBtn" class="sec-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-plus" viewBox="0 0 16 16">
                            <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
                        </svg>
                    </button>
                </div>


                <!--  -->
                <div class="filters btn-filter-div">
                    <button class="btn-filter" id="allBtn">All</button>
                    <button class="btn-filter" id="activeBtn">Active</button>
                    <button class="btn-filter" id="completedBtn">Completed</button>
                    <button class="btn-filter" id="clearAll">Clear All</button>
                </div>


                <!--  -->
                <div class="d-flex">
                    <ul id="taskList"></ul>
                </div>
            </div>
        </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>


  </body>
</html>
